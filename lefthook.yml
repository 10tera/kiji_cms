pre-commit:
  parallel: true
  jobs:
    - name: biome-check
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm exec biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}

pre-push:
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: lint
      run: pnpm lint
